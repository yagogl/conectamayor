{% extends 'base.html' %}
{% block titulo %}Unirse al grupo familiar{% endblock %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="mb-3" style="color: var(--color-principal);">Unirse al grupo familiar</h2>
                    <p class="text-muted">Introduce el código que te han compartido (ejemplo: FAM-7X2K)</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" name="codigo" class="form-control form-control-lg text-center fw-bold"
                                placeholder="FAM-XXXX" maxlength="8" style="letter-spacing: 4px; font-size: 1.5rem;" required>
                        </div>
                        <button type="submit" class="btn btn-lg w-100 text-white"
                            style="background-color: var(--color-principal);">
                            Unirme
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
