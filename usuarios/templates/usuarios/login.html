{% extends 'base.html' %}
{% block titulo %}Iniciar sesión — ConectaMayor{% endblock %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4" style="color: var(--color-principal);">
                        <i class="bi bi-house-heart"></i> ConectaMayor
                    </h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Usuario</label>
                            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" name="password" class="form-control form-control-lg" required>
                        </div>
                        <button type="submit" class="btn btn-lg w-100 text-white"
                            style="background-color: var(--color-principal);">
                            Entrar
                        </button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
