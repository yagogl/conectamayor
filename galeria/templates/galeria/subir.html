{% extends 'base.html' %}
{% block titulo %}Subir foto — ConectaMayor{% endblock %}

{% block estilos_extra %}
<style>
    {% if user.es_mayor %}
    .form-control, .btn { font-size: 1.2rem; padding: 0.8rem; }
    {% endif %}
</style>
{% endblock %}

{% block contenido %}
<div class="container mt-4">
    <h2 style="color: var(--color-principal);">📷 Subir foto</h2>
    <form method="post" enctype="multipart/form-data" class="mt-3">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label fw-bold {% if user.es_mayor %}fs-5{% endif %}">
                Selecciona una foto
            </label>
            <label class="btn btn-lg btn-outline-primary w-100 py-3" style="cursor: pointer;" id="label-foto">
                📷 Pulsa aquí para elegir una foto
                <input type="file" name="imagen" accept="image/*" required
                    style="display: none;"
                    onchange="document.getElementById('label-foto').childNodes[0].textContent = '✅ Foto seleccionada: ' + this.files[0].name + ' ';">
            </label>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold {% if user.es_mayor %}fs-5{% endif %}">
                Título (opcional)
            </label>
            <input type="text" name="titulo" class="form-control"
                placeholder="Ej: Cumpleaños de Pepe">
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-lg text-white"
                style="background-color: var(--color-principal);">
                📤 Subir foto
            </button>
            <a href="{% url 'galeria:lista' %}" class="btn btn-lg btn-outline-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
